# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # main 브랜치에 push될 때 실행
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24 강제 적용

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # 최신 버전

      - name: Install Node.js
        uses: actions/setup-node@v4 # 최신 버전
        with:
          node-version: '24'        # Node.js 24 사용

      - name: Build
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist   # 빌드 결과물 폴더
